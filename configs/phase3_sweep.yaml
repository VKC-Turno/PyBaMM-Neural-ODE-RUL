version: 1
name: phase3_corpus_v1
description: 7-anchor Sobol perturbation corpus per configs/phase3_design.md
seed_base: 789
n_sims_per_anchor: 70
n_anchors: 7
total_target: 490

horizon:
  max_cycles: 2500
  soh_stop: 0.65

# Independent per-θ log-normal (or linear for V_SEI) draws around each anchor.
# Units: log10 dec = standard deviation in decades of log10; relative = fractional σ of value.
perturbation_sigma:
  k_SEI: {space: log10, sigma_dec: 0.6}
  V_SEI: {space: linear, sigma_rel: 0.15}
  D_SEI_solvent: {space: log10, sigma_dec: 0.7}
  k_plating: {space: log10, sigma_dec: 0.5}
  LAM_neg_rate_s: {space: log10, sigma_dec: 0.8}
  LAM_pos_rate_s: {space: log10, sigma_dec: 0.3}

# Per-anchor Sobol draws are rejected if |Spearman rho| exceeds the threshold.
decorrelation_gate:
  metric: spearman_rho
  target_pair: [k_SEI, LAM_neg_rate_s]
  abs_threshold: 0.10

# Ensure a minimum count of "fast-fade quadrant" samples on the REPT anchors
# so knee-cycle behaviour is represented (R2 in design doc).
fast_fade_booster:
  anchors: [REPT_0007, REPT_0057]
  min_samples_in_quadrant: 10
  quadrant:
    D_SEI: floor
    LAM_neg: ceiling

# REPT anchors get 2x wider bounds on all axes to help fast-fade cover OOD
# regions; interior-minimum re-check must be emitted to the fit log (R4).
rept_anchor_bound_widen: 2.0

quality_filters:
  final_soh_max: 0.98
  final_soh_min: 0.55
  monotonicity_tol: 0.005
  min_cycles_kept: 100

model:
  name: SPMe
  temperature_C: 25.0
  solver: IDAKLU
  rtol: 1.0e-6
  atol: 1.0e-6

compute:
  n_jobs: 5
  checkpoint_every_n_anchors: 1

# Anchor set. fitted_theta values are physical units, pulled verbatim from
# configs/deg_params/<CELL>.yaml (fitted_params.*.value).
anchors:
  - id: CALB_0003
    deg_params_source: configs/deg_params/CALB_0003.yaml
    bol_params_source: configs/bol_params/CALB_0003.yaml
    protocol_id: CALB_0.5C_0.5D_15_100
    fitted_theta:
      k_SEI: 2.1169905064235324e-11              # [m.s-1]
      V_SEI: 0.00011173376694876834              # [m3.mol-1]
